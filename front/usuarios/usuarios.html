<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Admin - Usuários</title>
    <link rel="stylesheet" href="usuarios.css">
</head>

<body>

    <header class="topbar">
        <div class="left">
            <button class="btn-voltar" onclick="voltar()">← Voltar</button>
            <h1>Gerenciamento de Usuários</h1>
        </div>

        <button class="btn-novo" onclick="abrirModal()">+ Novo Usuário</button>
    </header>

    <section class="filtros">

        <input type="text" id="filtro-nome" placeholder="Buscar usuário..." oninput="filtrar()">

        <select id="filtro-perfil" onchange="filtrar()">
            <option value="">Todos</option>
            <option value="adm">Administrador</option>
            <option value="cliente">Cliente</option>
        </select>

    </section>

    <div class="tabela-container">

        <table>

            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Número</th>
                    <th>Perfil</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela-usuarios"></tbody>

        </table>

    </div>

    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-content">

            <h2>Novo Usuário</h2>

            <input type="hidden" id="codusuario">

            <input type="text" id="nome" placeholder="Nome">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="numero" placeholder="Número">
            <input type="password" id="senha" placeholder="Senha">

            <select id="perfil">
                <option value="cliente">Cliente</option>
                <option value="adm">Administrador</option>
            </select>

            <input type="file" id="foto" accept="image/*">

            <img id="preview" class="preview-img">

            <div class="modal-buttons">

                <button class="salvar" onclick="salvar()">Salvar</button>
                <button class="cancelar" onclick="fecharModal()">Cancelar</button>

            </div>

        </div>

    </div>

    <script src="usuarios.js"></script>

</body>

</html>
